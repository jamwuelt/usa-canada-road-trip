<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美國加拿大自駕遊</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        :root {
            --sea: #e8f4f8;
            --sea-deep: #a8d5e0;
            --sand: #f5e6d3;
            --ink: #1a1a2e;
            --ink-soft: #5a6b62;
            --paper: #faf8f5;
            --red: #c41e3a;
            --red-soft: #f5c8b8;
            --blue: #002868;
            --blue-soft: #c8e5e3;
            --white: #ffffff;
            --gray: #f0f0f0;
            --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "Segoe UI Rounded", "Helvetica Neue", "PingFang TC", "Microsoft JhengHei", sans-serif;
            --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            background: linear-gradient(180deg, var(--sea) 0%, var(--sea) 320px, var(--paper) 320px);
            color: var(--ink);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        .page {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 0 48px;
        }

        .masthead {
            padding: 28px 20px 18px;
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 6px;
            font-family: var(--font-display);
            font-size: 12.5px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--red);
        }

        h1 {
            margin: 0 0 8px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: clamp(26px, 6vw, 34px);
            letter-spacing: -0.01em;
            color: var(--blue);
        }

        .sub {
            margin: 0;
            font-size: 14.5px;
            color: var(--ink-soft);
        }

        .day-tabs {
            display: flex;
            gap: 8px;
            padding: 6px 16px 14px;
            overflow-x: auto;
            position: sticky;
            top: 0;
            z-index: 5;
            background: var(--sea);
            scrollbar-width: none;
        }

        .day-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            flex: 0 0 auto;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 14px;
            border: none;
            border-radius: 999px;
            padding: 9px 16px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.55);
            color: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.25;
            transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
        }

        .tab span {
            font-size: 10.5px;
            font-weight: 600;
            opacity: 0.75;
            font-family: var(--font-body);
        }

        .tab.is-active {
            color: #fff;
            transform: translateY(-1px);
            background: var(--red);
        }

        .map-wrap {
            padding: 4px 12px 8px;
        }

        .map-card {
            background: var(--sea);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05) inset;
            height: 300px;
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 22px;
        }

        .timeline {
            padding: 18px 16px 4px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .day-panel {
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .day-panel.is-active {
            display: flex;
        }

        .stop {
            background: #fff;
            border-radius: 16px;
            padding: 12px 14px;
            cursor: pointer;
            display: grid;
            grid-template-columns: 64px 1fr auto;
            gap: 12px;
            align-items: start;
            border: 1px solid rgba(20, 30, 48, 0.08);
            transition: all 0.2s ease;
        }

        .stop:hover {
            box-shadow: 0 2px 8px rgba(196, 30, 58, 0.1);
            border-color: var(--red);
        }

        .stop time {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 13px;
            color: var(--blue);
            line-height: 1.35;
        }

        .stop-body h3 {
            margin: 0 0 3px;
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
        }

        .stop-body p {
            margin: 0;
            font-size: 13px;
            color: var(--ink-soft);
            line-height: 1.5;
        }

        .check-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid rgba(20, 30, 48, 0.25);
            background: #fff;
            cursor: pointer;
            flex: 0 0 auto;
            align-self: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            color: transparent;
            font-size: 14px;
            line-height: 1;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }

        .stop.is-done {
            opacity: 0.45;
        }

        .stop.is-done .check-btn {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff;
        }

        /* Bottom sheet */
        .sheet-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(20, 30, 48, 0.45);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 20;
        }

        .sheet-backdrop.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .sheet {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            max-width: 760px;
            margin: 0 auto;
            background: var(--paper);
            border-radius: 20px 20px 0 0;
            padding: 6px 20px 24px;
            transform: translateY(100%);
            transition: transform 0.25s ease;
            z-index: 21;
            max-height: 78vh;
            overflow-y: auto;
            box-shadow: 0 -10px 28px rgba(20, 30, 48, 0.2);
        }

        .sheet.is-open {
            transform: translateY(0);
        }

        .sheet-grabber {
            width: 36px;
            height: 4px;
            background: #ddd;
            border-radius: 99px;
            margin: 10px auto 6px;
        }

        .sheet-close {
            position: absolute;
            top: 10px;
            right: 12px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(20, 30, 48, 0.08);
            color: var(--ink);
            font-size: 19px;
            line-height: 1;
            cursor: pointer;
        }

        .sheet-inner {
            display: flex;
            gap: 14px;
            padding-top: 10px;
        }

        .sheet-accent {
            width: 5px;
            border-radius: 99px;
            flex: 0 0 auto;
            background: var(--red);
        }

        .sheet-content {
            min-width: 0;
            flex: 1;
        }

        .sheet-time {
            margin: 0 0 2px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 13px;
            color: var(--blue);
        }

        .sheet-title {
            margin: 0 0 8px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 19px;
            color: var(--ink);
        }

        .sheet-note {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            color: var(--ink);
        }

        .sheet-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .sheet-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 15px;
            border-radius: 12px;
            background: #fff;
            border: 1px solid var(--red);
            text-decoration: none;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 13px;
            color: var(--red);
            cursor: pointer;
        }

        .sheet-btn:hover {
            background: var(--red);
            color: #fff;
        }

        @media (prefers-reduced-motion: reduce) {
            .tab, .sheet, .sheet-backdrop {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="masthead">
            <p class="eyebrow">美國 & 加拿大 · 2026年8月3-10日</p>
            <h1>自駕遊冒險</h1>
            <p class="sub">互動式路線和飯店指南 · 1,800+ 英里 · I-80 州際公路</p>
        </header>

        <nav class="day-tabs" role="tablist">
            <button class="tab is-active" data-day="1" role="tab" aria-selected="true">Day 1<span>8/3 週日</span></button>
            <button class="tab" data-day="2" role="tab">Day 2<span>8/4 週一</span></button>
            <button class="tab" data-day="3" role="tab">Day 3<span>8/5 週二</span></button>
            <button class="tab" data-day="4" role="tab">Day 4<span>8/6 週三</span></button>
            <button class="tab" data-day="5" role="tab">Day 5<span>8/7 週四</span></button>
            <button class="tab" data-day="6" role="tab">Day 6<span>8/8 週五</span></button>
            <button class="tab" data-day="7" role="tab">Day 7<span>8/9 週六</span></button>
            <button class="tab" data-day="8" role="tab">Day 8<span>8/10 週日</span></button>
        </nav>

        <div class="map-wrap">
            <div class="map-card">
                <div id="map"></div>
            </div>
        </div>

        <section class="timeline" id="timeline">
            <div class="day-panel is-active" data-panel="1"></div>
            <div class="day-panel" data-panel="2"></div>
            <div class="day-panel" data-panel="3"></div>
            <div class="day-panel" data-panel="4"></div>
            <div class="day-panel" data-panel="5"></div>
            <div class="day-panel" data-panel="6"></div>
            <div class="day-panel" data-panel="7"></div>
            <div class="day-panel" data-panel="8"></div>
        </section>
    </div>

    <div class="sheet-backdrop" id="sheetBackdrop"></div>
    <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="sheet-grabber"></div>
        <button class="sheet-close" id="sheetClose">×</button>
        <div class="sheet-inner">
            <div class="sheet-accent"></div>
            <div class="sheet-content">
                <p class="sheet-time" id="sheetTime"></p>
                <h3 class="sheet-title" id="sheetTitle"></h3>
                <p class="sheet-note" id="sheetNote"></p>
                <div class="sheet-actions" id="sheetActions"></div>
            </div>
        </div>
    </div>

    <script>
        const STOPS = {
            'd1-start': { day: '1', title: '威農山', location: '伊利諾州 (Vernon Hill, IL) - 出發點', time: '08:00', note: '開始你的美國和加拿大史詩級自駕遊冒險！' },
            'd1-hazleton': { day: '1', title: '假日快捷酒店', location: '黑茲爾頓 (Hazleton, PA 18222)', time: '17:00', note: '第一夜停留。在賓州休息，為紐約做準備！' },
            
            'd2-drive-nyc': { day: '2', title: '前往紐約城', location: '賓州 → 紐約州 (Pennsylvania → New York)', time: '08:00-17:00', note: '進入紐約州，踏上大蘋果之旅' },
            'd2-lotte': { day: '2', title: '樂天宮殿飯店', location: '紐約 (NYC - Midtown Manhattan)', time: '18:00', note: '抵達樂天宮殿飯店。探索時代廣場、中央公園和標誌性的紐約地標。' },
            
            'd3-nyc': { day: '3', title: '紐約城探險', location: '紐約市 (New York City)', time: '全天', note: '繼續探索紐約。造訪自由女神像、布魯克林橋、博物館等。' },
            'd3-lotte-night': { day: '3', title: '樂天宮殿飯店', location: '中城曼哈頓 (Midtown Manhattan)', time: '晚上', note: '在紐約又一晚' },
            
            'd4-nyc-ithaca': { day: '4', title: '紐約到伊薩卡', location: '紐約州 (New York)', time: '08:00-16:00', note: '向北開車前往康奈爾大學' },
            'd4-stater': { day: '4', title: '思泰特飯店', location: '伊薩卡 (Ithaca, NY - Cornell University)', time: '17:00', note: '抵達思泰特飯店。探索美麗的康奈爾校園和伊薩卡峽谷。' },
            
            'd5-cornell': { day: '5', title: '康奈爾和伊薩卡', location: '伊薩卡 (Ithaca, NY)', time: '全天', note: '探索瀑布、峽谷和伊薩卡周圍的風景秀麗景觀。' },
            'd5-stater-night': { day: '5', title: '思泰特飯店', location: '康奈爾 (Cornell)', time: '晚上', note: '在康奈爾又一晚' },
            
            'd6-ithaca-niagara': { day: '6', title: '前往尼亞加拉瀑布', location: '紐約州 → 加拿大 (New York → Canada)', time: '08:00-15:00', note: '開車前往標誌性的尼亞加拉瀑布' },
            'd6-sheraton': { day: '6', title: '喜來登瀑布景觀飯店', location: '尼亞加拉瀑布 (Niagara Falls, ON)', time: '16:00', note: '欣賞尼亞加拉瀑布的壯觀景色。驚嘆於這個自然奇蹟！' },
            
            'd7-niagara-london': { day: '7', title: '前往倫敦安大略', location: '加拿大 (Canada)', time: '08:00-14:00', note: '向西開車穿過安大略省' },
            'd7-townplace': { day: '7', title: '城鎮廣場套房飯店', location: '倫敦安大略 (London, Ontario)', time: '15:00', note: '抵達倫敦。探索魅力十足的安大略城市。' },
            
            'd8-return': { day: '8', title: '返回家鄉', location: '倫敦安大略 → 威農山 (London, ON → Vernon Hill)', time: '08:00', note: '開始返回伊利諾州的旅程，完成你的史詩級冒險！' }
        };

        const DAY_ORDER = {
            '1': ['d1-start', 'd1-hazleton'],
            '2': ['d2-drive-nyc', 'd2-lotte'],
            '3': ['d3-nyc', 'd3-lotte-night'],
            '4': ['d4-nyc-ithaca', 'd4-stater'],
            '5': ['d5-cornell', 'd5-stater-night'],
            '6': ['d6-ithaca-niagara', 'd6-sheraton'],
            '7': ['d7-niagara-london', 'd7-townplace'],
            '8': ['d8-return']
        };

        const COORDINATES = {
            'd1-start': [42.0711, -87.8518],
            'd1-hazleton': [40.9506, -75.7453],
            'd2-lotte': [40.7580, -73.9855],
            'd4-stater': [42.4534, -76.4735],
            'd6-sheraton': [43.0896, -79.0849],
            'd7-townplace': [42.9849, -81.2453],
            'd8-return': [42.0711, -87.8518]
        };

        let currentDay = '1';
        let lastFocused = null;
        const sheetEl = document.getElementById('sheet');
        const backdropEl = document.getElementById('sheetBackdrop');
        const doneSet = {};
        let map;
        let markers = {};
        let polyline;

        // Initialize map
        function initMap() {
            map = L.map('map').setView([41.5, -78], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            // Draw route
            const coords = [
                [42.0711, -87.8518],  // Vernon Hill
                [40.9506, -75.7453],  // Hazleton
                [40.7580, -73.9855],  // NYC
                [42.4534, -76.4735],  // Ithaca
                [43.0896, -79.0849],  // Niagara Falls
                [42.9849, -81.2453],  // London
                [42.0711, -87.8518]   // Return
            ];

            polyline = L.polyline(coords, {
                color: '#c41e3a',
                weight: 3,
                opacity: 0.7,
                dashArray: '5, 5'
            }).addTo(map);

            // Add markers
            const stopLocations = [
                { coords: [42.0711, -87.8518], title: '威農山', color: '#c41e3a' },
                { coords: [40.9506, -75.7453], title: '黑茲爾頓', color: '#002868' },
                { coords: [40.7580, -73.9855], title: '紐約', color: '#002868' },
                { coords: [42.4534, -76.4735], title: '伊薩卡', color: '#002868' },
                { coords: [43.0896, -79.0849], title: '尼亞加拉瀑布', color: '#002868' },
                { coords: [42.9849, -81.2453], title: '倫敦', color: '#002868' }
            ];

            stopLocations.forEach((stop, idx) => {
                const marker = L.circleMarker(stop.coords, {
                    radius: 8,
                    fillColor: stop.color,
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map);

                marker.bindPopup(`<strong>${stop.title}</strong>`);
                marker.on('click', () => {
                    map.setView(stop.coords, 9);
                });
            });
        }

        function buildStopCard(id) {
            const s = STOPS[id];
            if (!s) return null;
            const el = document.createElement('div');
            el.className = 'stop';
            el.tabIndex = 0;
            el.setAttribute('role', 'button');
            el.innerHTML = `
                <time>${s.time}</time>
                <div class="stop-body">
                    <h3>${s.title}</h3>
                    <p>${s.location}</p>
                </div>
            `;
            
            const chk = document.createElement('button');
            chk.className = 'check-btn';
            chk.type = 'button';
            chk.setAttribute('aria-label', '標記為完成');
            chk.textContent = '✓';
            chk.addEventListener('click', (e) => {
                e.stopPropagation();
                el.classList.toggle('is-done');
                doneSet[id] = !doneSet[id];
            });
            el.appendChild(chk);
            
            el.addEventListener('click', () => openStopCard(id, el));
            el.addEventListener('keydown', (e) => {
                if ((e.key === 'Enter' || e.key === ' ') && e.target === el) {
                    e.preventDefault();
                    openStopCard(id, el);
                }
            });
            return el;
        }

        function renderTimeline() {
            Object.keys(DAY_ORDER).forEach((day) => {
                const panel = document.querySelector(`.day-panel[data-panel="${day}"]`);
                if (!panel) return;
                panel.innerHTML = '';
                DAY_ORDER[day].forEach((id) => {
                    const card = buildStopCard(id);
                    if (card) panel.appendChild(card);
                });
            });
        }

        function openStopCard(id, triggerEl) {
            const s = STOPS[id];
            if (!s) return;
            lastFocused = triggerEl || document.activeElement;
            
            document.getElementById('sheetTime').textContent = s.time || '';
            document.getElementById('sheetTitle').textContent = s.title;
            document.getElementById('sheetNote').innerHTML = s.note || '';
            
            sheetEl.classList.add('is-open');
            backdropEl.classList.add('is-open');
            sheetEl.setAttribute('aria-hidden', 'false');
            document.getElementById('sheetClose').focus();
        }

        function closeStopCard() {
            sheetEl.classList.remove('is-open');
            backdropEl.classList.remove('is-open');
            sheetEl.setAttribute('aria-hidden', 'true');
            if (lastFocused && typeof lastFocused.focus === 'function') lastFocused.focus();
        }

        function setDay(day) {
            currentDay = day;
            document.querySelectorAll('.tab').forEach((t) => {
                const active = t.getAttribute('data-day') === day;
                t.classList.toggle('is-active', active);
                t.setAttribute('aria-selected', active ? 'true' : 'false');
            });
            document.querySelectorAll('.day-panel').forEach((p) => {
                p.classList.toggle('is-active', p.getAttribute('data-panel') === day);
            });
        }

        // Event listeners
        document.querySelectorAll('.tab').forEach((t) => {
            t.addEventListener('click', () => setDay(t.getAttribute('data-day')));
        });

        backdropEl.addEventListener('click', closeStopCard);
        document.getElementById('sheetClose').addEventListener('click', closeStopCard);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeStopCard();
        });

        // Initialize
        renderTimeline();
        setDay('1');
        initMap();
    </script>
</body>
</html>

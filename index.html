<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USA & Canada Road Trip 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .sidebar {
            flex: 1;
            background: white;
            overflow-y: auto;
            padding: 20px 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .map-container {
            height: 280px;
            position: relative;
            border-top: 1px solid #e0e0e0;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .header {
            margin-bottom: 16px;
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .header p {
            color: #999;
            font-size: 12px;
        }

        .trip-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            color: white;
            font-size: 12px;
            line-height: 1.6;
        }

        .trip-summary strong {
            display: block;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .stops-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stop {
            background: #fafafa;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .stop:active {
            background: #f0f0f0;
        }

        .stop.active {
            background: #f0f4ff;
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }

        .stop-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
        }

        .stop.active .stop-indicator {
            background: #764ba2;
            box-shadow: 0 0 6px rgba(118, 75, 162, 0.4);
        }

        .stop-content {
            margin-left: 16px;
        }

        .stop-date {
            color: #667eea;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .stop-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .stop-location {
            color: #666;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .stop-image {
            width: 100%;
            height: 80px;
            background: #e8e8e8;
            border-radius: 6px;
            margin-bottom: 8px;
            object-fit: cover;
            display: none;
        }

        .stop.active .stop-image {
            display: block;
        }

        .stop-hotel {
            background: white;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 11px;
            border-left: 3px solid #667eea;
        }

        .stop-hotel strong {
            display: block;
            color: #333;
            margin-bottom: 2px;
        }

        .stop-description {
            font-size: 12px;
            color: #555;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .stop-distance {
            font-size: 11px;
            color: #999;
            background: #f5f5f5;
            padding: 6px 8px;
            border-radius: 4px;
        }

        /* Scrollbar styling */
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:active {
            background: #999;
        }

        /* Desktop view */
        @media (min-width: 768px) {
            body {
                flex-direction: row;
            }

            .sidebar {
                width: 400px;
                border-bottom: none;
                border-right: 1px solid #e0e0e0;
                padding: 24px 20px;
            }

            .map-container {
                flex: 1;
                height: auto;
                border-top: none;
            }

            .stop-image {
                display: block !important;
            }
        }

        /* Loading indicator */
        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h1>🚗 Road Trip 2026</h1>
                <p>USA & Canada Adventure</p>
            </div>

            <div class="trip-summary">
                <strong>📍 Vernon Hill, IL</strong>
                Aug 3-10 | ~1,800 miles<br>
                Route: Interstate 80
            </div>

            <div class="stops-list" id="stops-container">
                <div class="loading">Loading stops...</div>
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <script>
        // Trip data
        const tripData = [
            {
                id: 1,
                date: "Aug 3",
                title: "Starting Point",
                location: "Vernon Hill, IL",
                hotel: "Begin your adventure",
                description: "Depart from the Midwest and head east through scenic landscapes.",
                image: "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=400&h=250&fit=crop",
                lat: 42.0711,
                lng: -87.8518,
                distance: "Start"
            },
            {
                id: 2,
                date: "Aug 3",
                title: "Holiday Inn Express",
                location: "Hazleton, PA",
                hotel: "Holiday Inn Express Drum-Hazleton",
                description: "First overnight stop in Pennsylvania. Rest and recharge before NYC.",
                image: "https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=400&h=250&fit=crop",
                lat: 40.9506,
                lng: -75.7453,
                distance: "550 miles"
            },
            {
                id: 3,
                date: "Aug 4-6",
                title: "Lotte Palace",
                location: "NYC - Midtown Manhattan",
                hotel: "Lotte Palace Hotel",
                description: "3 nights in the Big Apple! Explore Times Square, Central Park, Statue of Liberty, and iconic NYC landmarks.",
                image: "https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=400&h=250&fit=crop",
                lat: 40.7580,
                lng: -73.9855,
                distance: "200 miles"
            },
            {
                id: 4,
                date: "Aug 7",
                title: "Stater Hotel",
                location: "Ithaca, NY - Cornell",
                hotel: "Stater Hotel at Cornell University",
                description: "Journey to upstate New York. Explore beautiful Cornell campus and Ithaca's stunning gorges and waterfalls.",
                image: "https://images.unsplash.com/photo-1518156677180-95a2893f3e9f?w=400&h=250&fit=crop",
                lat: 42.4534,
                lng: -76.4735,
                distance: "250 miles"
            },
            {
                id: 5,
                date: "Aug 8",
                title: "Sheraton Fallsview",
                location: "Niagara Falls, ON",
                hotel: "Sheraton Fallsview Hotel",
                description: "Cross into Canada! Experience the majestic Niagara Falls with spectacular views and adventure activities.",
                image: "https://images.unsplash.com/photo-1532274040911-5f82f1d0c18c?w=400&h=250&fit=crop",
                lat: 43.0896,
                lng: -79.0849,
                distance: "70 miles"
            },
            {
                id: 6,
                date: "Aug 9",
                title: "TownePlace Suites",
                location: "London, Ontario",
                hotel: "TownePlace Suites by Marriott",
                description: "Continue west through Ontario. Explore the charming city of London and prepare for the return journey.",
                image: "https://images.unsplash.com/photo-1519456590522-46c69acd42fe?w=400&h=250&fit=crop",
                lat: 42.9849,
                lng: -81.2453,
                distance: "150 miles"
            },
            {
                id: 7,
                date: "Aug 10",
                title: "Return Home",
                location: "Vernon Hill, IL",
                hotel: "Complete the circle",
                description: "Drive back to Illinois, completing your epic USA & Canada adventure with memories to last a lifetime!",
                image: "https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=400&h=250&fit=crop",
                lat: 42.0711,
                lng: -87.8518,
                distance: "1,000 miles"
            }
        ];

        // Initialize map
        const map = L.map('map').setView([41.5, -78], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 19
        }).addTo(map);

        // Draw route
        const routeCoordinates = tripData.map(stop => [stop.lat, stop.lng]);
        L.polyline(routeCoordinates, {
            color: '#764ba2',
            weight: 2,
            opacity: 0.6
        }).addTo(map);

        // Add markers
        const markers = {};
        tripData.forEach((stop) => {
            const marker = L.circleMarker([stop.lat, stop.lng], {
                radius: 6,
                fillColor: '#667eea',
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            markers[stop.id] = marker;

            marker.on('click', () => {
                highlightStop(stop.id);
            });
        });

        // Render stops in sidebar
        const stopsContainer = document.getElementById('stops-container');
        stopsContainer.innerHTML = '';

        tripData.forEach(stop => {
            const stopEl = document.createElement('div');
            stopEl.className = 'stop';
            stopEl.id = `stop-${stop.id}`;
            
            stopEl.innerHTML = `
                <div class="stop-indicator"></div>
                <div class="stop-content">
                    <div class="stop-date">${stop.date}</div>
                    <div class="stop-title">${stop.title}</div>
                    <div class="stop-location">📍 ${stop.location}</div>
                    <img src="${stop.image}" alt="${stop.title}" class="stop-image">
                    <div class="stop-hotel">
                        <strong>${stop.hotel}</strong>
                    </div>
                    <div class="stop-description">${stop.description}</div>
                    <div class="stop-distance">📏 ${stop.distance}</div>
                </div>
            `;

            stopEl.addEventListener('click', () => {
                highlightStop(stop.id);
                map.setView([stop.lat, stop.lng], 9);
            });

            stopsContainer.appendChild(stopEl);
        });

        // Highlight function
        function highlightStop(stopId) {
            document.querySelectorAll('.stop').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById(`stop-${stopId}`).classList.add('active');

            Object.values(markers).forEach(marker => {
                marker.setRadius(6);
                marker.setStyle({ fillColor: '#667eea' });
            });

            if (markers[stopId]) {
                markers[stopId].setRadius(10);
                markers[stopId].setStyle({ fillColor: '#764ba2' });
            }

            // Scroll to active stop on mobile
            const activeStop = document.getElementById(`stop-${stopId}`);
            if (activeStop && window.innerWidth < 768) {
                setTimeout(() => {
                    activeStop.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);
            }
        }

        // Auto-highlight first stop
        highlightStop(1);
    </script>
</body>
</html>

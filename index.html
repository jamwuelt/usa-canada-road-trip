<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美國加拿大自駕遊</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        :root {
            --red: #c41e3a;
            --blue: #002868;
            --ink: #1a1a2e;
            --ink-soft: #5a6b62;
            --paper: #faf8f5;
            --sea: #e8f4f8;
            --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", sans-serif;
            --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
        body {
            background: linear-gradient(180deg, var(--sea) 0%, var(--sea) 320px, var(--paper) 320px);
            color: var(--ink);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        .page { max-width: 760px; margin: 0 auto; padding: 0 0 48px; }
        .masthead { padding: 28px 20px 18px; text-align: center; }
        .eyebrow {
            margin: 0 0 6px;
            font-family: var(--font-display);
            font-size: 12.5px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--red);
        }

        h1 {
            margin: 0 0 8px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: clamp(26px, 6vw, 34px);
            color: var(--blue);
        }

        .sub { margin: 0; font-size: 14.5px; color: var(--ink-soft); }

        .day-tabs {
            display: flex;
            gap: 8px;
            padding: 6px 16px 14px;
            overflow-x: auto;
            position: sticky;
            top: 0;
            z-index: 5;
            background: var(--sea);
            scrollbar-width: none;
        }

        .day-tabs::-webkit-scrollbar { display: none; }

        .tab {
            flex: 0 0 auto;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 14px;
            border: none;
            border-radius: 999px;
            padding: 9px 16px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.55);
            color: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.25;
            transition: background 0.15s ease;
        }

        .tab span { font-size: 10.5px; font-weight: 600; opacity: 0.75; }
        .tab.is-active { color: #fff; background: var(--red); }

        .map-wrap { padding: 4px 12px 8px; }
        .map-card {
            background: var(--sea);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05) inset;
            height: 300px;
            position: relative;
        }

        .map-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: 1;
            border-radius: 22px;
        }

        #map { width: 100%; height: 100%; border-radius: 22px; position: relative; z-index: 2; }
        .leaflet-routing-container { display: none !important; }

        .timeline {
            padding: 18px 16px 4px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .day-panel { display: none; flex-direction: column; gap: 10px; }
        .day-panel.is-active { display: flex; }

        .stop {
            background: #fff;
            border-radius: 16px;
            padding: 12px 14px;
            cursor: pointer;
            display: grid;
            grid-template-columns: 64px 1fr auto;
            gap: 12px;
            align-items: start;
            border: 1px solid rgba(20, 30, 48, 0.08);
            transition: all 0.2s ease;
            position: relative;
        }

        .stop.is-ai-suggestion::before {
            content: '💡 AI建議';
            position: absolute;
            top: 8px;
            right: 40px;
            font-size: 10px;
            background: #fff3cd;
            color: #856404;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .stop:hover { box-shadow: 0 2px 8px rgba(196, 30, 58, 0.1); border-color: var(--red); }
        .stop time { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--blue); line-height: 1.35; }
        .stop-body h3 { margin: 0 0 3px; font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--ink); }
        .stop-body p { margin: 0; font-size: 13px; color: var(--ink-soft); line-height: 1.5; }

        .check-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid rgba(20, 30, 48, 0.25);
            background: #fff;
            cursor: pointer;
            flex: 0 0 auto;
            align-self: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            color: transparent;
            font-size: 14px;
            line-height: 1;
            transition: all 0.15s ease;
        }

        .stop.is-done { opacity: 0.45; }
        .stop.is-done .check-btn { background: var(--blue); border-color: var(--blue); color: #fff; }

        .sheet-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(20, 30, 48, 0.45);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 20;
        }

        .sheet-backdrop.is-open { opacity: 1; pointer-events: auto; }

        .sheet {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            max-width: 760px;
            margin: 0 auto;
            background: var(--paper);
            border-radius: 20px 20px 0 0;
            padding: 6px 20px 24px;
            transform: translateY(100%);
            transition: transform 0.25s ease;
            z-index: 21;
            max-height: 78vh;
            overflow-y: auto;
            box-shadow: 0 -10px 28px rgba(20, 30, 48, 0.2);
        }

        .sheet.is-open { transform: translateY(0); }
        .sheet-grabber { width: 36px; height: 4px; background: #ddd; border-radius: 99px; margin: 10px auto 6px; }
        .sheet-close {
            position: absolute;
            top: 10px; right: 12px;
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(20, 30, 48, 0.08);
            color: var(--ink);
            font-size: 19px;
            line-height: 1;
            cursor: pointer;
        }

        .sheet-inner { display: flex; gap: 14px; padding-top: 10px; }
        .sheet-accent { width: 5px; border-radius: 99px; flex: 0 0 auto; background: var(--red); }
        .sheet-content { min-width: 0; flex: 1; }
        .sheet-time { margin: 0 0 2px; font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--blue); }
        .sheet-title { margin: 0 0 8px; font-family: var(--font-display); font-weight: 800; font-size: 19px; color: var(--ink); }
        .sheet-note { margin: 0; font-size: 14px; line-height: 1.6; color: var(--ink); }
        .sheet-cost { margin: 10px 0 0 0; padding-top: 10px; border-top: 1px solid #e0e0e0; font-size: 14px; font-weight: 600; color: var(--red); }
    </style>
</head>
<body>
    <div class="page">
        <header class="masthead">
            <p class="eyebrow">美國 & 加拿大 · 2026年8月3-10日</p>
            <h1>自駕遊冒險</h1>
            <p class="sub">互動式路線和飯店指南 · 1,800+ 英里</p>
        </header>

        <nav class="day-tabs" role="tablist">
            <button class="tab is-active" data-day="1" role="tab">Day 1<span>8/3</span></button>
            <button class="tab" data-day="2" role="tab">Day 2<span>8/4</span></button>
            <button class="tab" data-day="3" role="tab">Day 3<span>8/5</span></button>
            <button class="tab" data-day="4" role="tab">Day 4<span>8/6</span></button>
            <button class="tab" data-day="5" role="tab">Day 5<span>8/7</span></button>
            <button class="tab" data-day="6" role="tab">Day 6<span>8/8</span></button>
            <button class="tab" data-day="7" role="tab">Day 7<span>8/9</span></button>
            <button class="tab" data-day="8" role="tab">Day 8<span>8/10</span></button>
        </nav>

        <div class="map-wrap">
            <div class="map-card">
                <div class="map-background" id="mapBackground"></div>
                <div id="map"></div>
            </div>
        </div>

        <section class="timeline" id="timeline">
            <div class="day-panel is-active" data-panel="1"></div>
            <div class="day-panel" data-panel="2"></div>
            <div class="day-panel" data-panel="3"></div>
            <div class="day-panel" data-panel="4"></div>
            <div class="day-panel" data-panel="5"></div>
            <div class="day-panel" data-panel="6"></div>
            <div class="day-panel" data-panel="7"></div>
            <div class="day-panel" data-panel="8"></div>
        </section>
    </div>

    <div class="sheet-backdrop" id="sheetBackdrop"></div>
    <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="sheet-grabber"></div>
        <button class="sheet-close" id="sheetClose">×</button>
        <div class="sheet-inner">
            <div class="sheet-accent"></div>
            <div class="sheet-content">
                <p class="sheet-time" id="sheetTime"></p>
                <h3 class="sheet-title" id="sheetTitle"></h3>
                <p class="sheet-note" id="sheetNote"></p>
                <p class="sheet-cost" id="sheetCost"></p>
            </div>
        </div>
    </div>

    <script>
        const BG = {'1':'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1200&h=400&fit=crop','2':'https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?w=1200&h=400&fit=crop','3':'https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?w=1200&h=400&fit=crop','4':'https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?w=1200&h=400&fit=crop','5':'https://images.unsplash.com/photo-1518156677180-95a2893f3e9f?w=1200&h=400&fit=crop','6':'https://images.unsplash.com/photo-1532274040911-5f82f1d0c18c?w=1200&h=400&fit=crop','7':'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=1200&h=400&fit=crop','8':'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1200&h=400&fit=crop'};

        const STOPS = {
            'd1-start':{day:'1',title:'威農山',location:'伊利諾州 (Vernon Hill)',time:'08:00',note:'開始冒險！',cost:null},
            'd1-hotel':{day:'1',title:'假日快捷酒店',location:'黑茲爾頓 (Hazleton, PA)',time:'17:00',note:'第一晚',cost:'$117.54 (3間房)'},
            'd2-nyc':{day:'2',title:'前往紐約',location:'賓州→紐約州',time:'08:00-17:00',note:'6小時車程',cost:null},
            'd2-hotel':{day:'2',title:'樂天宮殿飯店',location:'紐約 (Midtown)',time:'18:00',note:'紐約住3晚',cost:'$1,150/晚 (3間房)'},
            'd2-cruise':{day:'2',title:'自由女神郵輪',location:'紐約港',time:'19:30',note:'欣賞夜景',cost:'$122.50'},
            'd3-edge':{day:'3',title:'Edge觀景台',location:'紐約 (Midtown)',time:'09:00',note:'西半球最高',cost:null},
            'd3-met':{day:'3',title:'大都會美術館',location:'上東城',time:'11:30-16:00',note:'藝術展品',cost:null},
            'd3-park':{day:'3',title:'💡中央公園',location:'中央公園',time:'16:30-17:30',note:'(AI建議)日落散步',cost:null},
            'd3-show':{day:'3',title:'獅子王百老匯',location:'劇院區',time:'20:00',note:'音樂劇',cost:null},
            'd3-hotel':{day:'3',title:'樂天宮殿',location:'紐約',time:'晚上',note:'',cost:'$1,150/晚 (3間房)'},
            'd4-walk':{day:'4',title:'💡時代廣場',location:'時代廣場',time:'08:00',note:'(AI建議)晨景',cost:null},
            'd4-wall':{day:'4',title:'華爾街',location:'金融區',time:'10:00',note:'銅牛、證交所',cost:null},
            'd4-wtc':{day:'4',title:'世貿中心',location:'金融區',time:'12:00',note:'最高摩天大樓',cost:null},
            'd4-911':{day:'4',title:'💡9/11紀念',location:'世貿遺址',time:'15:30',note:'(AI建議)歷史紀念',cost:null},
            'd4-dinner':{day:'4',title:'💡蘇荷晚餐',location:'蘇荷區',time:'19:00',note:'(AI建議)世界美食',cost:null},
            'd4-hotel':{day:'4',title:'樂天宮殿',location:'紐約',time:'晚上',note:'',cost:'$1,150/晚 (3間房)'},
            'd5-museum':{day:'5',title:'💡自然史博物館',location:'上西城',time:'09:00',note:'(AI建議)恐龍展',cost:null},
            'd5-bridge':{day:'5',title:'💡布魯克林橋',location:'布魯克林',time:'13:00',note:'(AI建議)徒步',cost:null},
            'd5-dumbo':{day:'5',title:'💡DUMBO',location:'布魯克林',time:'14:30',note:'(AI建議)藝術街區',cost:null},
            'd5-westpoint-prep':{day:'5',title:'前往西點',location:'紐約→西點',time:'17:00',note:'準備明天10AM導覽',cost:null},
            'd5-stater':{day:'5',title:'思泰特飯店',location:'伊薩卡 (Cornell)',time:'20:00',note:'康奈爾大學',cost:'$1,158 (3間房)'},
            'd6-westpoint':{day:'6',title:'西點軍校',location:'紐約 (West Point)',time:'09:30-13:00',note:'10AM導覽，9:30到',cost:'$110.24'},
            'd6-hudson':{day:'6',title:'💡哈德遜河',location:'紐約州',time:'14:00',note:'(AI建議)風景',cost:null},
            'd6-return':{day:'6',title:'返回伊薩卡',location:'西點→伊薩卡',time:'16:30',note:'3.5小時',cost:null},
            'd7-cornell':{day:'7',title:'康奈爾校園',location:'伊薩卡',time:'08:00',note:'常春藤校園',cost:null},
            'd7-gorge':{day:'7',title:'伊薩卡峽谷',location:'伊薩卡',time:'12:30',note:'壯觀瀑布',cost:null},
            'd7-dinner':{day:'7',title:'💡康蒙斯晚餐',location:'伊薩卡',time:'18:00',note:'(AI建議)當地美食',cost:null},
            'd7-niagara':{day:'7',title:'前往尼亞加拉',location:'伊薩卡→尼亞加拉',time:'19:00',note:'4小時夜車',cost:null},
            'd8-sheraton':{day:'8',title:'喜來登瀑布飯店',location:'尼亞加拉 (Fallsview)',time:'23:00',note:'瀑布景色',cost:'$2,208.78 CAD (3間房)'},
            'd8-light':{day:'8',title:'💡瀑布夜景',location:'尼亞加拉',time:'20:00',note:'(AI建議)燈光秀',cost:null},
            'd8-london':{day:'8',title:'前往倫敦',location:'尼亞加拉→倫敦',time:'08:00',note:'2小時車程',cost:null},
            'd8-townplace':{day:'8',title:'城鎮廣場飯店',location:'倫敦 (London)',time:'15:00',note:'安大略',cost:'$499 CAD (3間房)'},
            'd8-explore':{day:'8',title:'💡倫敦市區',location:'倫敦',time:'16:00',note:'(AI建議)市集咖啡',cost:null}
        };

        const DAYS={1:['d1-start','d1-hotel'],2:['d2-nyc','d2-hotel','d2-cruise'],3:['d3-edge','d3-met','d3-park','d3-show','d3-hotel'],4:['d4-walk','d4-wall','d4-wtc','d4-911','d4-dinner','d4-hotel'],5:['d5-museum','d5-bridge','d5-dumbo','d5-westpoint-prep','d5-stater'],6:['d6-westpoint','d6-hudson','d6-return'],7:['d7-cornell','d7-gorge','d7-dinner','d7-niagara'],8:['d8-sheraton','d8-light','d8-london','d8-townplace','d8-explore']};
        const AI=['d3-park','d4-walk','d4-911','d4-dinner','d5-museum','d5-bridge','d5-dumbo','d6-hudson','d7-dinner','d8-light','d8-explore'];
        const WP=[[42.0711,-87.8518],[40.9506,-75.7453],[40.7580,-73.9855],[41.4925,-73.9604],[42.4534,-76.4735],[43.0896,-79.0849],[42.9849,-81.2453],[42.0711,-87.8518]];

        let day='1',map,sheet=document.getElementById('sheet'),backdrop=document.getElementById('sheetBackdrop'),done={};

        function initMap(){
            map=L.map('map').setView([41.5,-78],5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
            const wp=WP.map(p=>L.latLng(p[0],p[1]));
            L.Routing.control({waypoints:wp,routeWhileDragging:false,createMarker:(i,w)=>L.circleMarker(w.latLng,{radius:8,fillColor:i===0||i===7?'#c41e3a':'#002868',color:'#fff',weight:2,opacity:1,fillOpacity:0.8}),lineOptions:{styles:[{color:'#c41e3a',opacity:0.7,weight:3}]}}).addTo(map);
            document.querySelectorAll('.leaflet-routing-container').forEach(e=>e.style.display='none');
        }

        function card(id){
            const s=STOPS[id];if(!s)return null;
            const el=document.createElement('div');el.className='stop';if(AI.includes(id))el.classList.add('is-ai-suggestion');
            el.innerHTML=`<time>${s.time}</time><div class="stop-body"><h3>${s.title}</h3><p>${s.location}</p></div>`;
            const btn=document.createElement('button');btn.className='check-btn';btn.type='button';btn.textContent='✓';
            btn.onclick=(e)=>{e.stopPropagation();el.classList.toggle('is-done');done[id]=!done[id];};
            el.appendChild(btn);
            el.onclick=()=>open(id,el);
            el.onkeydown=(e)=>{if((e.key==='Enter'||e.key===' ')&&e.target===el){e.preventDefault();open(id,el);}};
            return el;
        }

        function render(){Object.keys(DAYS).forEach(d=>{const p=document.querySelector(`.day-panel[data-panel="${d}"]`);if(p){p.innerHTML='';DAYS[d].forEach(id=>{const c=card(id);if(c)p.appendChild(c);});}});}

        function open(id,el){
            const s=STOPS[id];if(!s)return;
            document.getElementById('sheetTime').textContent=s.time||'';
            document.getElementById('sheetTitle').textContent=s.title;
            document.getElementById('sheetNote').innerHTML=s.note||'';
            const c=document.getElementById('sheetCost');
            if(s.cost){c.textContent='💰 '+s.cost;c.style.display='block';}else c.style.display='none';
            sheet.classList.add('is-open');backdrop.classList.add('is-open');sheet.setAttribute('aria-hidden','false');
        }

        function close(){sheet.classList.remove('is-open');backdrop.classList.remove('is-open');sheet.setAttribute('aria-hidden','true');}

        function setDay(d){
            day=d;document.getElementById('mapBackground').style.backgroundImage=`url('${BG[d]}')`;
            document.querySelectorAll('.tab').forEach(t=>{const a=t.getAttribute('data-day')===d;t.classList.toggle('is-active',a);});
            document.querySelectorAll('.day-panel').forEach(p=>p.classList.toggle('is-active',p.getAttribute('data-panel')===d));
        }

        document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setDay(t.getAttribute('data-day')));
        backdrop.onclick=close;document.getElementById('sheetClose').onclick=close;
        document.onkeydown=(e)=>{if(e.key==='Escape')close();};

        render();setDay('1');initMap();
    </script>
</body>
</html>
